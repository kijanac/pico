# git-cliff configuration — generates CHANGELOG.md and per-tag release notes
# from the git history. Tuned for this repo's descriptive, non-conventional
# commit subjects (no feat:/fix: prefixes required).

[changelog]
header = """
# Changelog

All notable changes to Pico.
"""
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | trim }}
{% endfor %}\
{% endfor %}
"""
trim = false
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
# First match wins. The catch-all keeps every non-Release commit in the log.
commit_parsers = [
  { message = "^Release ", skip = true },
  { message = "^Merge ", skip = true },
  { message = "^(Add|Surface|Introduce|Implement)", group = "Added" },
  { message = "^Fix", group = "Fixed" },
  { message = "^(Remove|Drop|Delete)", group = "Removed" },
  { message = ".*", group = "Changed" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"