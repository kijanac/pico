<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fbf3ea" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      (() => {
        const mode = localStorage.getItem("pico.theme") || "system";
        const systemDark = matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved = mode === "light" ? "light" : mode === "dark" ? "dark" : systemDark ? "dark" : "light";
        document.documentElement.classList.toggle("dark", resolved === "dark");
        if (mode === "light" || mode === "dark") document.documentElement.dataset.theme = mode;
      })();
    </script>
    <title>Pico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
